name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.vscode/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
        run: npx prisma generate

      - name: Generate Paraglide i18n files
        run: npx @inlang/paraglide-js compile

      - name: Biome 检查
        run: npx biome ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: 跑测试
        run: pnpm test

      - name: 构建
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
        run: pnpm build
